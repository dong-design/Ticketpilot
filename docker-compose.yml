services:
  postgres:
    image: postgres:17
    container_name: ticketpilot-postgres
    environment:
      POSTGRES_DB: ticketpilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: ticketpilot-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
